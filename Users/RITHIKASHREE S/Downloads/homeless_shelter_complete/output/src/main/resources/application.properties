# ===============================
# APPLICATION
# ===============================
spring.application.name=homeless_shelter

# ===============================
# SERVER
# ===============================
server.port=1010

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/homeless_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Rithu@09
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# SECURITY (disable default user)
# ===============================
spring.security.user.name=disabled
spring.security.user.password=disabled
spring.main.allow-bean-definition-overriding=true

# ===============================
# SCHEDULING (enable @Scheduled)
# ===============================
spring.task.scheduling.pool.size=5

